<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trọ Tốt - Đăng ký tài khoản</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .auth-container { display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 100px); }
        .auth-card { width: 100%; max-width: 450px; padding: 40px; border-radius: 24px; }
        .auth-card h2 { text-align: center; color: #006064; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #004d40; font-size: 14px; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.6); background: rgba(255, 255, 255, 0.5); backdrop-filter: blur(5px); outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: #00acc1; background: rgba(255, 255, 255, 0.8); }
        .btn-auth { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #00acc1; color: white; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-auth:hover { background: #00838f; }
        .auth-links { text-align: center; margin-top: 20px; font-size: 14px; }
        .auth-links a { color: #00838f; text-decoration: none; font-weight: bold; }
        .error-message { color: #d32f2f; background: rgba(211, 47, 47, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="auth-container">
        <div class="glass-card auth-card">
            <h2>Đăng Ký Thành Viên</h2>
            <div id="error-box" class="error-message"></div>
            
            <form id="register-form">
                <div class="form-group">
                    <label>Họ và tên</label>
                    <input type="text" id="fullname" required placeholder="Nguyễn Văn A">
                </div>
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="tel" id="phone" required placeholder="0901234567">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="example@gmail.com">
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" required placeholder="Tối thiểu 6 ký tự">
                </div>
                <button type="submit" class="btn-auth">Đăng Ký Ngay</button>
            </form>
            
            <div class="auth-links">
                Đã có tài khoản? <a href="/login">Đăng nhập</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Cấu hình từ dự án tro-317af
        const firebaseConfig = {
            apiKey: "AIzaSyDafMjJNIN-HUzp_mqqAlW74yLWvJGkrYo",
            authDomain: "tro-317af.firebaseapp.com",
            projectId: "tro-317af",
            storageBucket: "tro-317af.firebasestorage.app",
            messagingSenderId: "831726753265",
            appId: "1:831726753265:web:96db692530fb00d20ee050",
            measurementId: "G-BETW102J5C"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorBox = document.getElementById('error-box');
            errorBox.style.display = 'none';

            const name = document.getElementById('fullname').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await updateProfile(user, { displayName: name });

                const profileResponse = await fetch('/api/create-user-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        uid: user.uid,
                        email: email,
                        display_name: name,
                        phone: phone
                    })
                });

                const idToken = await user.getIdToken();
                // (Giữ nguyên phần fetch ở trên...)
                const sessionResponse = await fetch('/api/set-session', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ idToken: idToken })
                });

                if (sessionResponse.ok) {
                    alert("🎉 Đăng ký tài khoản thành công! Nhấn OK để vào trang chủ.");
                    window.location.href = '/'; 
                } else {
                    const errData = await sessionResponse.json();
                    throw new Error("Lỗi Server: " + errData.message);
                }

            } catch (error) {
                // ... (Giữ nguyên đoạn catch ở dưới)
                errorBox.innerText = "Lỗi đăng ký: " + error.message;
                errorBox.style.display = 'block';
            }
        });
        
    </script>
    
</body>
</html>
